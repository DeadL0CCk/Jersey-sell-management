<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jersey Sales Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="{{ url_for('dashboard') }}" class="brand">Jersey Sales</a>
            <nav class="nav-links">
                <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Today</a>
                <a href="{{ url_for('record_sale') }}" class="{% if request.endpoint == 'record_sale' %}active{% endif %}">Record Sale</a>
                <a href="{{ url_for('setup_stock') }}" class="{% if request.endpoint == 'setup_stock' %}active{% endif %}">Add Stock</a>
                <a href="{{ url_for('delete_stock') }}" class="{% if request.endpoint == 'delete_stock' %}active{% endif %}">Delete Stock</a>
                <a href="{{ url_for('inventory') }}" class="{% if request.endpoint == 'inventory' %}active{% endif %}">Inventory</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-list">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
